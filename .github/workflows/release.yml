name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  # The project pins go 1.23 and x/term v0.27.0; prevent the toolchain from
  # auto-updating to a version that breaks compatibility.
  GOTOOLCHAIN: local

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
